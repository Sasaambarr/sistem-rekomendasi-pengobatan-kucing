<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Pasien</title>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  font-family: Arial;
  margin: 0;

  background-image: url("/static/img/bg.jpg"); /* sesuaikan nama file */
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 400px;
  margin: 60px auto;
   background: 
    linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)),
    url("/static/img/bg.jpg");

  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
}

.input-group {
  margin-bottom: 15px;
}

.input-group label {
  font-weight: bold;
  display: block;
  margin-bottom: 5px;
}

.input-group input, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
}

.input-group input:focus {
  border-color: #6c63ff;
  box-shadow: 0 0 5px rgba(108,99,255,0.5);
}

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #6c63ff;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #574bdb;
}

.icon {
  margin-right: 8px;
}

.info-text {
  margin: 10px 0 20px;
  padding: 12px;
  background: rgba(102, 126, 234, 0.15);
  border-left: 5px solid #667eea;
  border-radius: 10px;
  font-size: 14px;
  color: #333;
}
</style>
</head>

<div class="logout-wrapper">
  <button class="logout" onclick="logout()">
    <i class="fa-solid fa-right-from-bracket"></i>
  </button>
</div>

<body>

<div class="container-form">

  <div class="title">🐱 Form Data Pasien</div>
  <div class="info-text">
  Silakan isi data pasien di bawah ini dengan lengkap dan benar sebelum melanjutkan.
</div>

  <div class="input-group">
    <label>Nama Pemilik</label>
    <input type="text" id="nama_pemilik" placeholder="Masukkan nama pemilik">
  </div>

  <div class="input-group">
    <label>Nama Kucing</label>
    <input type="text" id="nama_kucing" placeholder="Masukkan nama kucing">
  </div>

  <div class="input-group">
    <label>Jenis Kucing</label>
    <input type="text" id="jenis" placeholder="Contoh: Persia, Anggora">
  </div>

  <div class="input-group">
    <label>Umur (bulan)</label>
    <input type="number" id="umur" placeholder="Contoh: 6">
  </div>

  <div class="input-group">
    <label>Alamat</label>
    <input type="text" id="alamat" placeholder="Masukkan alamat">
  </div>

  <button class="btn" onclick="simpan()">
    <i class="fa-solid fa-floppy-disk icon"></i> Simpan
  </button>

</div>

<script>
async function simpan() {
  let data = {
    nama_pemilik: document.getElementById("nama_pemilik").value,
    nama_kucing: document.getElementById("nama_kucing").value,
    jenis: document.getElementById("jenis").value,
    umur: document.getElementById("umur").value,
    alamat: document.getElementById("alamat").value
  };

  let res = await fetch("/tambah_pasien", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  let hasil = await res.json();

  if (hasil.status === "success") {
    alert("Data berhasil disimpan");

    // 🔥 simpan id ke localStorage
    localStorage.setItem("pasien_id", hasil.id);

    // 🔥 redirect sesuai role kamu
    window.location.href = "/";  // balik ke login
  } else {
    alert("Gagal menyimpan");
  }
}
</script>

</body>
</html>
